name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/deployment.yaml"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/boudreaux-labs/app-portfolio-site:latest
            ghcr.io/boudreaux-labs/app-portfolio-site:${{ github.sha }}

      - name: Update deployment image tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="ghcr.io/boudreaux-labs/app-portfolio-site:${{ github.sha }}"
          FILE="k8s/deployment.yaml"
          FILE_SHA=$(gh api repos/boudreaux-labs/app-portfolio-site/contents/$FILE --jq '.sha')
          sed -i "s|ghcr.io/boudreaux-labs/app-portfolio-site:.*|$NEW_TAG|" $FILE
          CONTENT=$(base64 -w 0 < $FILE)
          gh api --method PUT repos/boudreaux-labs/app-portfolio-site/contents/$FILE \
            --field message="ci: update image tag to ${{ github.sha }} [skip ci]" \
            --field content="$CONTENT" \
            --field sha="$FILE_SHA" \
            --field branch=main
