name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/deployment.yaml"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/boudreaux-labs/app-portfolio-site:latest
            ghcr.io/boudreaux-labs/app-portfolio-site:${{ github.sha }}

      - name: Update deployment image tag
        run: |
          sed -i "s|ghcr.io/boudreaux-labs/app-portfolio-site:.*|ghcr.io/boudreaux-labs/app-portfolio-site:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
