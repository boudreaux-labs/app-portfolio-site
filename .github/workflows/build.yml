name: build

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/boudreaux-labs/app-portfolio-site:latest
            ghcr.io/boudreaux-labs/app-portfolio-site:${{ github.sha }}

      - name: Update deployment image tag
        run: |
          sed -i "s|ghcr.io/boudreaux-labs/app-portfolio-site:.*|ghcr.io/boudreaux-labs/app-portfolio-site:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
